<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Earth Local Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #earth-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <canvas id="earth-canvas"></canvas>

  <!-- Three.js（用 unpkg，比 cdnjs 稳） -->
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

  <script>
    var canvas = document.getElementById('earth-canvas');

    // 场景
    var scene = new THREE.Scene();

    // 相机
    var camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 4.5;

    // 渲染器
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    // ✅ 关键：用本地 IMAGE 里的图
    var textureLoader = new THREE.TextureLoader();
    var texture = textureLoader.load(
      './IMAGE/earth.jpg',   // ← 重点：相对路径
      function () {
        console.log('✅ 地球贴图加载成功');
      },
      undefined,
      function () {
        console.error('❌ 地球贴图加载失败，请检查 IMAGE/earth.jpg 是否存在');
      }
    );

    // 球体
    var geometry = new THREE.SphereGeometry(2, 128, 128);
    var material = new THREE.MeshBasicMaterial({ map: texture });
    var earth = new THREE.Mesh(geometry, material);
    scene.add(earth);

    // 旋转
    function animate() {
      requestAnimationFrame(animate);
      earth.rotation.y += 0.001; // 稍微快一点，方便你确认“在转”
      renderer.render(scene, camera);
    }
    animate();

    // 自适应
    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
