<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Li Yang Qu · 经明 · EDGE Lab</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='none'/%3E%3Cpath d='M6 22 Q16 10 26 22' stroke='%231a1a1a' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='10' r='1.2' fill='%231a1a1a'/%3E%3C/svg%3E">

  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --sub: #555555;
      --spacing: 4rem;
      font-family: "Inter", -apple-system, BlinkMacSystemFont,
                   "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --fg: #e5e5e5;
        --sub: #999999;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .brand {
      text-align: center;
      max-width: 720px;
      margin: auto;
    }

    .slogan {
      font-size: clamp(1.15rem, 2.8vw, 1.45rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.6;
      color: var(--fg);
    }

    .motto {
      margin-top: 0.6rem;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--sub);
      line-height: 1.9;
    }

    .byline {
      margin-top: 3.2rem;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--sub);
      text-transform: uppercase;
    }

    /* 防止中英文黏连 */
    .slogan span {
      margin-right: 0.15em;
    }
  </style>
</head>

<body>
  <div class="brand">
    <div class="slogan">
      Exploration Demands Geodetic Errors
    </div>

    <div class="motto">
      差非所屏，乃所由经。界不自形，唯探乃明。
    </div>

    <div class="byline">
      Li Yang Qu · 经明 · EDGE Lab
    </div>
  </div>
</body>
</html>
