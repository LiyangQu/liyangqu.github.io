<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liyang QU | 经明 · EDGE</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='none'/%3E%3Cpath d='M6 22 Q16 10 26 22' stroke='%23ffffff' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='10' r='1.2' fill='%23ffffff'/%3E%3C/svg%3E" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --fg: #ffffff;
      --sub: #b0b0b8;
      --accent: #4a9eff;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
      overflow-x: hidden;
      position: relative;
    }

    /* 地球背景 — 右下角 */
    .bg-earth {
      position: fixed;
      right: -5vw;
      bottom: -10vh;
      width: 55vw;
      height: 55vw;
      max-width: 700px;
      max-height: 700px;
      background: url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=800&q=60')
        center / cover no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      filter: blur(1px);
    }

    /* 左侧装饰线 */
    .left-line {
      position: fixed;
      left: 2.5rem;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.08) 20%, rgba(255,255,255,0.08) 80%, transparent 100%);
      z-index: 1;
    }

    /* 主内容区 */
    .main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 3rem 6rem 5rem;
      max-width: 900px;
    }

    /* 姓名行 */
    .name {
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--sub);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* 英文口号 */
    .slogan {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.35;
      color: var(--fg);
      margin-bottom: 1.5rem;
    }

    /* 中文骈辞 — 一横排 */
    .motto {
      font-family: 'Noto Serif SC', 'KaiTi', '楷体', 'STKaiti', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.28em;
      line-height: 1.8;
      color: var(--sub);
      white-space: nowrap;
    }

    /* 分隔线 */
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 2.5rem 0;
    }

    /* 实验室名 */
    .lab {
      font-size: clamp(0.7rem, 1.3vw, 0.8rem);
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-top: 0.8rem;
    }

    /* 底部导航 — 固定、醒目 */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding: 1.1rem 2rem;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .nav a {
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s, transform 0.2s;
      padding: 0.3rem 0.5rem;
    }

    .nav a:hover {
      color: var(--fg);
      transform: translateY(-1px);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .main { padding: 2rem 1.5rem 5rem 2.5rem; }
      .left-line { left: 1rem; }
      .bg-earth { width: 70vw; height: 70vw; right: -15vw; }
      .nav { gap: 1.2rem; }
    }
  </style>
</head>

<body>
  <!-- 背景地球 -->
  <div class="bg-earth"></div>

  <!-- 左侧装饰线 -->
  <div class="left-line"></div>

  <!-- 主内容 -->
  <div class="main">
    <div class="name">Liyang QU | 经明 · EDGE</div>

    <div class="slogan">
      Exploration Demands<br>
      Geodetic Errors
    </div>

    <div class="motto">
      差非所屏，乃所由经。界不自形，唯探乃明。
    </div>

    <div class="divider"></div>

    <div class="lab">经明 · EDGE Lab</div>
  </div>

  <!-- 底部导航 -->
  <nav class="nav">
    <a href="#">About</a>
    <a href="#">Research</a>
    <a href="#">Publications</a>
    <a href="#">CV</a>
  </nav>

</body>
</html>
