<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liyang QU | 经明 · EDGE</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='none'/%3E%3Cpath d='M6 22 Q16 10 26 22' stroke='%23ffffff' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='10' r='1.2' fill='%23ffffff'/%3E%3C/svg%3E" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap');

    :root {
      --bg: #0a0a0f;
      --fg: #ffffff;
      --sub: #a0a0a8;
      --overlay: rgba(6, 6, 12, 0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Playfair Display', 'Times New Roman', 'TMS Steep', Georgia, serif;
      overflow-x: hidden;
    }

    /* 地球背景 */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, var(--overlay) 0%, var(--overlay) 60%, var(--bg) 100%),
        url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=1920&q=80')
        center / cover no-repeat;
    }

    .brand {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
      z-index: 1;
    }

    /* 英文口号 */
    .slogan {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      line-height: 1.7;
      color: var(--fg);
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    /* 中文骈辞 */
    .motto {
      margin-top: 1rem;
      font-family: 'Noto Serif SC', 'KaiTi', '楷体', 'STKaiti', serif;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      line-height: 2.2;
      color: var(--sub);
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    }

    /* 署名 */
    .byline {
      margin-top: 3.5rem;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: var(--sub);
      text-transform: uppercase;
    }

    /* 导航（后续可扩展） */
    .nav {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-transform: uppercase;
    }
    .nav a {
      color: var(--sub);
      text-decoration: none;
      margin: 0 0.8rem;
      transition: color 0.2s;
    }
    .nav a:hover { color: var(--fg); }
  </style>
</head>

<body>
  <div class="hero">
    <div class="brand">
      <div class="slogan">
        Exploration Demands Geodetic Errors
      </div>

      <div class="motto">
        差非所屏，乃所由经。<br>
        界不自形，唯探乃明。
      </div>

      <div class="byline">
        Liyang QU | 经明 · EDGE
      </div>

      <div class="nav">
        <a href="#">About</a>
        <a href="#">Research</a>
        <a href="#">Publications</a>
        <a href="#">CV</a>
      </div>
    </div>
  </div>
</body>
</html>
