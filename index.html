<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liyang QU's Page | 经明 · EDGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --fg: #ffffff;
      --sub: #b0b0b0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ======== 顶部通栏 ======== */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 4rem;
      background: rgba(5, 5, 16, 0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .topbar-name {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .topbar-nav {
      display: flex;
      gap: 2.5rem;
    }

    .topbar-nav a {
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    .topbar-nav a:hover {
      color: var(--fg);
    }

    /* ======== 主内容区 ======== */
    .main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 4rem 4rem 4rem;
      max-width: 1000px;
    }

    /* 英文口号 */
    .slogan {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2.2rem;
    }

    /* 中文骈辞 — 一横排 */
    .motto {
      font-family: 'Noto Serif SC', 'KaiTi', '楷体', 'STKaiti', serif;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      line-height: 2;
      color: var(--sub);
      white-space: nowrap;
    }

    /* 分隔线 */
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 2.5rem 0 0 0;
    }

    /* ======== 地球背景 ======== */
    .bg-earth {
      position: fixed;
      bottom: -10vh;
      right: -15vw;
      width: 55vw;
      height: 55vw;
      background: url('https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=3000&q=100') center/cover no-repeat;
      border-radius: 50%;
      opacity: 0.25;
      filter: contrast(1.1) brightness(0.95);
      z-index: 1;
      pointer-events: none;
    }

    /* ======== 响应式 ======== */
    @media (max-width: 768px) {
      .topbar { padding: 0.8rem 1.2rem; }
      .topbar-nav { gap: 1rem; }
      .main { padding: 4rem 1.5rem 3rem 1.5rem; }
      .bg-earth { width: 75vw; height: 75vw; right: -20vw; bottom: -15vh; }
    }
  </style>
</head>

<body>
  <!-- 地球背景 -->
  <div class="bg-earth"></div>

  <!-- 顶部通栏 -->
  <div class="topbar">
    <div class="topbar-name">Liyang QU's Page</div>
    <nav class="topbar-nav">
      <a href="#">About</a>
      <a href="#">Research</a>
      <a href="#">Publications</a>
      <a href="#">CV</a>
    </nav>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <div class="slogan">
      Exploration Demands
      Geodetic Errors
    </div>

    <div class="motto">
      差非所屏，乃所由经。界不自形，唯探乃明。
    </div>

    <div class="divider"></div>
  </div>

</body>
</html>
