<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liyang QU | 经明 · EDGE</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='none'/%3E%3Cpath d='M6 22 Q16 10 26 22' stroke='%23ffffff' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='10' r='1.2' fill='%23ffffff'/%3E%3C/svg%3E" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --fg: #ffffff;
      --sub: #b0b0b8;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ========== 顶部栏 ========== */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
    }

    .topbar-name {
      font-size: clamp(0.8rem, 1.5vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--sub);
      text-transform: uppercase;
    }

    .topbar-nav {
      display: flex;
      gap: 2rem;
    }

    .topbar-nav a {
      font-size: clamp(0.7rem, 1.3vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s;
      padding: 0.2rem 0;
    }

    .topbar-nav a:hover {
      color: var(--fg);
    }

    /* ========== 地球背景 ========== */
    .bg-earth {
      position: fixed;
      right: -8vw;
      bottom: -8vh;
      width: 50vw;
      height: 50vw;
      max-width: 750px;
      max-height: 750px;
      background: url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=1200&q=85')
        center / cover no-repeat;
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      filter: blur(0px);
    }

    /* ========== 主内容 ========== */
    .main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6rem 4rem 4rem 4rem;
      max-width: 1000px;
    }

    /* 英文口号 */
    .slogan {
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 1.8rem;
    }

    /* 中文骈辞 — 一横排 */
    .motto {
      font-family: 'Noto Serif SC', 'KaiTi', '楷体', 'STKaiti', serif;
      font-size: clamp(1.15rem, 2.6vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      line-height: 2;
      color: var(--sub);
      white-space: nowrap;
    }

    /* 分隔线 */
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 2.5rem 0;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .topbar { padding: 0.8rem 1.2rem; }
      .topbar-nav { gap: 1rem; }
      .main { padding: 5rem 1.5rem 3rem 1.5rem; }
      .bg-earth { width: 75vw; height: 75vw; right: -20vw; }
    }
  </style>
</head>

<body>
  <!-- 地球背景 -->
  <div class="bg-earth"></div>

  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="topbar-name">Liyang QU's Page</div>
    <nav class="topbar-nav">
      <a href="#">About</a>
      <a href="#">Research</a>
      <a href="#">Publications</a>
      <a href="#">CV</a>
    </nav>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <div class="slogan">
      Exploration Demands<br>
      Geodetic Errors
    </div>

    <div class="motto">
      差非所屏，乃所由经。界不自形，唯探乃明。
    </div>

    <div class="divider"></div>
  </div>

</body>
</html>
