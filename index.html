<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Liyang QU's Page</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    /* ======== 地球 ======== */
    .earth {
      position: fixed;
      bottom: -2600px;
      right: -1800px;
      width: 4000px;
      height: 4000px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
      animation: earthSpin 300s linear infinite;
    }

    .earth img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes earthSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ======== 顶部横栏 ======== */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 10vh;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3vw;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }

    .topbar-name {
      font-family: "Times New Roman", Times, serif;
      font-weight: bold;
      font-size: 2.8vh;
      color: #fff;
      text-decoration: none;
    }

    .topbar-nav {
      display: flex;
      gap: 2.5rem;
    }

    .topbar-nav a {
      font-family: "Times New Roman", Times, serif;
      font-weight: bold;
      font-size: 2.8vh;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .topbar-nav a:hover {
      color: #fff;
    }

    /* ======== 主内容 ======== */
    .main {
      position: relative;
      z-index: 2;
      max-width: 60vw;
      padding: 14vh 4vw 4rem;
    }

    /* 英文口号 */
    .slogan {
      font-family: "Times New Roman", Times, serif;
      font-weight: bold;
      font-size: 10vh;
      line-height: 1.2;
      margin-bottom: 1.5vh;
      color: #fff;
      text-align: left;
    }

    /* 中文骈辞 —— 16字一行，和 Geodetic Errors 差不多长 */
    .motto {
      font-family: "仿宋 GB2312", "FangSong", "SimSun", serif;
      font-weight: bold;
      font-size: 3.6vh;              /* ✅ 明显再小 */
      line-height: 1.6;
      color: #ccc;
      text-align: left;
      letter-spacing: 0.25em;

      /* ✅ 强制一行 */
      white-space: nowrap;

      margin-top: 1.5vh;
    }

    .divider {
      display: none;
    }
  </style>
</head>

<body>
  <!-- 地球 -->
  <div class="earth">
    <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=2400&q=100"
         alt="Earth"
         onerror="this.src='https://images.unsplash.com/photo-1507400492013-6ebe2f95aab4?w=2400&q=100';">
  </div>

  <!-- 顶部横栏 -->
  <div class="topbar">
    <div class="topbar-name">Liyang QU</div>
    <nav class="topbar-nav">
      <a href="#" class="active">About</a>
      <a href="#">Research</a>
      <a href="#">Publications</a>
      <a href="#">CV</a>
    </nav>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <div class="slogan">
      Exploration Demands<br>
      Geodetic Errors
    </div>

    <div class="motto">
      差非所屏，乃所由经。界不自形，唯探乃明。
    </div>
  </div>

</body>
</html>
